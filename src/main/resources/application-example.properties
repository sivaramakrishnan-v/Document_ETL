# Copy to `application.properties` only if you want a local template baseline.
# Prefer using environment variables from `.env`.

spring.application.name=DocumentETL
spring.cloud.gcp.credentials.location=${SPRING_CLOUD_GCP_CREDENTIALS_LOCATION:classpath:gcp-vertex-key.json}
spring.ai.vertex.ai.gemini.project-id=${VERTEX_PROJECT_ID:your-gcp-project-id}
spring.ai.vertex.ai.gemini.location=${VERTEX_LOCATION:us-central1}

# Multipart uploads
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:500MB}

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_advisor_db?currentSchema=document_etl,public}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:your_db_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.type.json_format_mapper=jackson
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Kafka V2 orchestration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:document-etl-v2-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.document.documentetl.events
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.ack-mode=record

app.kafka.topics.document-staged-v2=${APP_KAFKA_TOPIC_DOCUMENT_STAGED_V2:document.staged.v2}
app.kafka.topics.document-chunks-ready-v2=${APP_KAFKA_TOPIC_DOCUMENT_CHUNKS_READY_V2:document.chunks-ready.v2}
app.kafka.topics.embedding-requested-v2=${APP_KAFKA_TOPIC_EMBEDDING_REQUESTED_V2:document.embedding-requested.v2}
app.kafka.retry.backoff-ms=${APP_KAFKA_RETRY_BACKOFF_MS:1000}
app.kafka.retry.max-attempts=${APP_KAFKA_RETRY_MAX_ATTEMPTS:3}

app.etl.v2.enabled=${APP_ETL_V2_ENABLED:true}
app.etl.v2.documents-directory=${APP_ETL_V2_DOCUMENTS_DIRECTORY:src/main/resources/documents}
app.etl.v2.auto-stage.enabled=${APP_ETL_V2_AUTO_STAGE_ENABLED:false}
app.etl.v2.auto-stage.initial-delay-ms=${APP_ETL_V2_AUTO_STAGE_INITIAL_DELAY_MS:5000}
app.etl.v2.auto-stage.fixed-delay-ms=${APP_ETL_V2_AUTO_STAGE_FIXED_DELAY_MS:10000}
app.etl.v2.embedding.model=${APP_ETL_V2_EMBEDDING_MODEL:text-embedding-004}
app.etl.v2.embedding.provider=${APP_ETL_V2_EMBEDDING_PROVIDER:vertex-ai}
app.etl.v2.embedding.dimension=${APP_ETL_V2_EMBEDDING_DIMENSION:768}
app.etl.v2.reconciliation.enabled=${APP_ETL_V2_RECONCILIATION_ENABLED:false}
app.etl.v2.reconciliation.fixed-delay-ms=${APP_ETL_V2_RECONCILIATION_FIXED_DELAY_MS:1800000}
app.etl.v2.reconciliation.batch-size=${APP_ETL_V2_RECONCILIATION_BATCH_SIZE:100}

langchain4j.vertex-ai.gemini.project=${LANGCHAIN4J_VERTEX_PROJECT:${spring.ai.vertex.ai.gemini.project-id}}
langchain4j.vertex-ai.gemini.location=${LANGCHAIN4J_VERTEX_LOCATION:${spring.ai.vertex.ai.gemini.location}}
langchain4j.vertex-ai.gemini.embedding-model.model-name=${LANGCHAIN4J_VERTEX_EMBEDDING_MODEL:text-embedding-004}
langchain4j.vertex-ai-gemini.chat-model.enabled=false
langchain4j.vertex-ai-gemini.chat-model.project=${LANGCHAIN4J_CHAT_PROJECT:${spring.ai.vertex.ai.gemini.project-id}}
langchain4j.vertex-ai-gemini.chat-model.location=${LANGCHAIN4J_CHAT_LOCATION:${spring.ai.vertex.ai.gemini.location}}

app.rag.generation.model-name=${APP_RAG_GENERATION_MODEL:gemini-2.5-flash}
app.rag.generation.temperature=${APP_RAG_GENERATION_TEMPERATURE:0.2}
app.rag.generation.max-retries=${APP_RAG_GENERATION_MAX_RETRIES:2}
app.rag.evaluation.model-name=${APP_RAG_EVALUATION_MODEL:gemini-2.5-pro}
app.rag.evaluation.temperature=${APP_RAG_EVALUATION_TEMPERATURE:0.0}
app.rag.evaluation.max-retries=${APP_RAG_EVALUATION_MAX_RETRIES:2}

app.evaluation.bigquery.enabled=${APP_EVALUATION_BIGQUERY_ENABLED:true}
app.evaluation.bigquery.project-id=${APP_EVALUATION_BIGQUERY_PROJECT_ID:${spring.ai.vertex.ai.gemini.project-id}}
app.evaluation.bigquery.dataset=${APP_EVALUATION_BIGQUERY_DATASET:rag_analytics}
app.evaluation.bigquery.table=${APP_EVALUATION_BIGQUERY_TABLE:evaluation_logs}

# PGVector Configuration
langchain4j.pgvector.host=${LANGCHAIN4J_PGVECTOR_HOST:localhost}
langchain4j.pgvector.port=${LANGCHAIN4J_PGVECTOR_PORT:5432}
langchain4j.pgvector.database=${LANGCHAIN4J_PGVECTOR_DATABASE:ai_advisor_db}
langchain4j.pgvector.table=${LANGCHAIN4J_PGVECTOR_TABLE:document_etl.document_chunks}
langchain4j.pgvector.dimension=${LANGCHAIN4J_PGVECTOR_DIMENSION:768}

mlflow.tracking-uri=${MLFLOW_TRACKING_URI:http://localhost:5000}
app.mlflow.experiment-id=${APP_MLFLOW_EXPERIMENT_ID:0}
app.mlflow.experiment-name=${APP_MLFLOW_EXPERIMENT_NAME:DocumentETL}
app.mlflow.action-logging.enabled=${APP_MLFLOW_ACTION_LOGGING_ENABLED:true}
app.mlflow.startup-test.enabled=${APP_MLFLOW_STARTUP_TEST_ENABLED:false}

app.logging.detailed-actions.enabled=${APP_LOGGING_DETAILED_ACTIONS_ENABLED:true}
app.chunk.size=${APP_CHUNK_SIZE:500}
app.chunk.overlap=${APP_CHUNK_OVERLAP:100}

resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=20
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.vertexEmbedding.base-config=default
resilience4j.circuitbreaker.instances.vertexEmbedding.failure-rate-threshold=40
resilience4j.circuitbreaker.instances.vertexEmbedding.wait-duration-in-open-state=20s

resilience4j.circuitbreaker.instances.generationLlm.base-config=default
resilience4j.circuitbreaker.instances.generationLlm.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.generationLlm.wait-duration-in-open-state=30s

resilience4j.circuitbreaker.instances.evaluationLlm.base-config=default
resilience4j.circuitbreaker.instances.evaluationLlm.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.evaluationLlm.wait-duration-in-open-state=15s

resilience4j.circuitbreaker.instances.mlflowWrite.base-config=default
resilience4j.circuitbreaker.instances.mlflowWrite.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.mlflowWrite.failure-rate-threshold=70
resilience4j.circuitbreaker.instances.mlflowWrite.wait-duration-in-open-state=60s

resilience4j.circuitbreaker.instances.bigqueryWrite.base-config=default
resilience4j.circuitbreaker.instances.bigqueryWrite.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bigqueryWrite.failure-rate-threshold=70
resilience4j.circuitbreaker.instances.bigqueryWrite.wait-duration-in-open-state=60s
