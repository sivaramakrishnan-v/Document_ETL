# Copy to `application.properties` only if you want a local template baseline.
# Prefer using environment variables from `.env`.

spring.application.name=DocumentETL
spring.cloud.gcp.credentials.location=${SPRING_CLOUD_GCP_CREDENTIALS_LOCATION:classpath:gcp-vertex-key.json}
spring.ai.vertex.ai.gemini.project-id=${VERTEX_PROJECT_ID:your-gcp-project-id}
spring.ai.vertex.ai.gemini.location=${VERTEX_LOCATION:us-central1}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_advisor_db?currentSchema=knowledge,public}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:your_db_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# MLflow
app.mlflow.experiment-name=${APP_MLFLOW_EXPERIMENT_NAME:DocumentETL}
app.mlflow.action-logging.enabled=${APP_MLFLOW_ACTION_LOGGING_ENABLED:true}
app.mlflow.startup-test.enabled=${APP_MLFLOW_STARTUP_TEST_ENABLED:false}

# RAG defaults
app.rag.generation.model-name=${APP_RAG_GENERATION_MODEL:gemini-2.5-flash}
app.rag.evaluation.model-name=${APP_RAG_EVALUATION_MODEL:gemini-2.5-pro}
