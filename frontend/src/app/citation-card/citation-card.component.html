<article class="citation-card">
  <div class="citation-header">
    <div>
      <h3>{{ citation.sourceName }}</h3>
      <p>Chunk {{ citation.chunkId }} | Page {{ citation.pageNumber }}</p>
    </div>
    <span class="score">{{ citation.score }}%</span>
  </div>

  <p class="chunk-text">{{ citation.text }}</p>
</article>
